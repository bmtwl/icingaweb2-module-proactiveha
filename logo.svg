<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    .outline { fill: none; stroke: #332931; stroke-width: 18; stroke-linecap: round; stroke-linejoin: round; }
    .green { fill: #44bb77; }
    .yellow { fill: #ffcc00; }
    .red { fill: #ff5566; }
    .gray { fill: #555555; }
    .dark { fill: #332931; }
  </style>

  <!-- Outer ring / cluster boundary -->
  <circle cx="256" cy="256" r="220" class="outline"/>

  <!-- Radiating connections to hosts -->
  <line x1="256" y1="256" x2="256" y2="72" class="outline"/>
  <line x1="256" y1="256" x2="96" y2="176" class="outline"/>
  <line x1="256" y1="256" x2="96" y2="336" class="outline"/>
  <line x1="256" y1="256" x2="416" y2="336" class="outline"/>
  <line x1="256" y1="256" x2="416" y2="176" class="outline"/>
  <line x1="256" y1="256" x2="256" y2="440" class="outline"/>

  <!-- Host nodes -->
  <circle cx="256" cy="72" r="28" class="dark"/>
  <circle cx="96" cy="176" r="28" class="dark"/>
  <circle cx="96" cy="336" r="28" class="dark"/>
  <circle cx="416" cy="336" r="28" class="dark"/>
  <circle cx="416" cy="176" r="28" class="dark"/>
  <circle cx="256" cy="440" r="28" class="dark"/>

  <!-- Central hexagon split into three health states -->
  <path d="M256 160 L330 203 L330 289 L256 332 L182 289 L182 203 Z" class="dark"/>
  <path d="M256 160 L330 203 L330 206 L256 246 Z" class="green"/>
  <path d="M256 160 L182 203 L182 206 L256 246 Z" class="gray"/>
  <path d="M256 246 L330 206 L330 289 L256 332 Z" class="yellow"/>
  <path d="M182 203 L256 246 L256 332 L182 289 Z" class="red"/>
</svg>
